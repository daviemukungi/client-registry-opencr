---
- name: Prepare server for Docker-based OpenCR installation
  hosts: all
  remote_user: "{{ user }}"
  become: true
  tags: prep

  tasks:

  - name: Install prerequisite packages for Docker repository
    apt:
      name:
        - ca-certificates
        - curl
        - gnupg
        - lsb-release
        - net-tools
        - git
        - rsync
        - ufw
      state: present
      update_cache: yes


  - name: Create directory for Docker GPG keyring
    file:
      path: /etc/apt/keyrings
      state: directory
      mode: 0755


  - name: Download Docker official GPG key
    get_url:
      url: https://download.docker.com/linux/ubuntu/gpg
      dest: /etc/apt/keyrings/docker.asc
      mode: 0644
      force: yes


  - name: Add Docker apt repository
    apt_repository:
      repo: >-
        deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
        https://download.docker.com/linux/ubuntu
        {{ ansible_lsb.codename }} stable
      state: present
      filename: docker


  - name: Install Docker Engine and Compose plugin
    apt:
      name:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
      state: present
      update_cache: yes


  - name: Enable and start Docker service
    service:
      name: docker
      state: started
      enabled: yes


  - name: Add deploying user to docker group
    user:
      name: "{{ user }}"
      groups: docker
      append: yes


# OpenSearch requires vm.max_map_count >= 262144
  - name: Set vm.max_map_count for OpenSearch
    sysctl:
      name: vm.max_map_count
      value: "262144"
      state: present
      reload: yes


# Allow the OpenCR UI and API port through the firewall
  - name: Enable ufw
    ufw:
      state: enabled
      policy: deny
      direction: incoming


  - name: Allow SSH through ufw
    ufw:
      rule: allow
      port: "22"
      proto: tcp


  - name: Allow OpenCR port 3000 through ufw
    ufw:
      rule: allow
      port: "3000"
      proto: tcp


  - name: Create /opt/client-registry owned by deploying user
    file:
      path: /opt/client-registry
      state: directory
      owner: "{{ user }}"
      group: "{{ user }}"
      mode: 0755


  - name: Gather facts on listening ports
    listen_ports_facts:


  - name: List TCP ports
    debug:
      msg: "{{ ansible_facts.tcp_listen | map(attribute='port') | sort | list }}"
