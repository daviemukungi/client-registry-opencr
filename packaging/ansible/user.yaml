---
- name: create opencr user
  hosts: all
  remote_user: "{{ user }}"
  become: true
  tags: prep

  vars_prompt:
    - name: "user"
      prompt: "Please enter the username (with sudo)"
      private: no

  tasks:
    - name: Create new user
      user:
        name: opencr
        shell: /bin/bash


    - name: Create .ssh folder
      file:
        path: ~opencr/.ssh
        state: directory
        owner: opencr
        group: opencr
        mode: 0700


    - name: Ensure authorized_keys file exists and dont write over it
      copy:
        content: ""
        dest: ~opencr/.ssh/authorized_keys
        force: no
        owner: opencr
        group: opencr
        mode: 0700


    - name: Set authorized key from ansible user
      authorized_key:
        user: opencr
        state: present
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

        
    # passwordless sudo via sudoers.d — works on Ubuntu and CentOS
    - name: Grant opencr passwordless sudo
      copy:
        content: "opencr ALL=(ALL) NOPASSWD: ALL\n"
        dest: /etc/sudoers.d/opencr
        mode: 0440
        validate: 'visudo -cf %s'


    - name: Set backend server env var for app
      lineinfile: 
        dest: ~opencr/.bash_profile 
        state: present 
        create: yes
        owner: opencr
        group: opencr
        regexp: '^BACKEND_SERVER'
        line: 'BACKEND_SERVER={{ ansible_default_ipv4.address }}'

