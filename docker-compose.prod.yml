services:

  postgres:
    container_name: hapi-postgres
    image: postgres:16-alpine
    platform: linux/amd64
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hapi}
      POSTGRES_USER: ${POSTGRES_USER:-hapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hapi} -d ${POSTGRES_DB:-hapi}"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  fhir:
    container_name: hapi-fhir
    image: hapiproject/hapi:v5.1.0
    platform: linux/amd64
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hapi}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hapi}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      HIBERNATE_DIALECT: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect

  opensearch:
    container_name: opensearch
    image: daviemukungi/opensearch:${OPENSEARCH_IMAGE_TAG:-20260625-4bea9e2}
    platform: linux/amd64
    restart: always
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms4g -Xmx4g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5

  opencr:
    container_name: opencr
    image: daviemukungi/opencr:${OPENCR_IMAGE_TAG:-20260625-4bea9e2}
    platform: linux/amd64
    restart: always
    ports:
      - "${OPENCR_PORT:-3000}:3000"
    depends_on:
      fhir:
        condition: service_started
      opensearch:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - HAPI_FHIR_URL=http://fhir:8080/fhir/metadata
    volumes:
      - ./server/config/config_production.json:/src/server/config/config_production.json:ro
    entrypoint:
      - /bin/sh
      - -c
      - exec dockerize -wait-retry-interval 5s -timeout 300s -wait "$$HAPI_FHIR_URL" node lib/app.js
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://localhost:3000/crux"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

volumes:
  pgdata:
    driver: local
  opensearch_data:
    driver: local
